<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Notifications - EDATA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      background:#f5f7fb;
      color:#0f172a;
      padding:20px;
    }

    .container{
      max-width:1200px;
      margin:0 auto;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:20px;
    }

    .topbar h1{
      font-size:28px;
      font-weight:800;
      color:#111827;
    }

    .topbar p{
      color:#64748b;
      margin-top:5px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1.4fr;
      gap:20px;
    }

    .card{
      background:#fff;
      border-radius:18px;
      box-shadow:0 10px 25px rgba(0,0,0,0.06);
      padding:20px;
    }

    .card h2{
      font-size:20px;
      margin-bottom:16px;
      color:#111827;
    }

    .form-group{
      margin-bottom:14px;
    }

    .form-group label{
      display:block;
      margin-bottom:6px;
      font-size:14px;
      font-weight:600;
      color:#334155;
    }

    .form-control{
      width:100%;
      border:1px solid #dbe3ef;
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      outline:none;
      transition:0.2s ease;
      background:#fff;
    }

    .form-control:focus{
      border-color:#1FAF6B;
      box-shadow:0 0 0 3px rgba(31,175,107,0.15);
    }

    textarea.form-control{
      min-height:140px;
      resize:vertical;
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:12px 18px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:0.2s ease;
    }

    .btn-primary{
      background:#1FAF6B;
      color:#fff;
    }

    .btn-primary:hover{
      background:#17965a;
    }

    .btn-secondary{
      background:#e2e8f0;
      color:#0f172a;
    }

    .btn-secondary:hover{
      background:#cbd5e1;
    }

    .btn-danger{
      background:#ef4444;
      color:#fff;
    }

    .btn-danger:hover{
      background:#dc2626;
    }

    .btn-warning{
      background:#f59e0b;
      color:#fff;
    }

    .btn-warning:hover{
      background:#d97706;
    }

    .status-box{
      margin-bottom:14px;
      padding:12px 14px;
      border-radius:12px;
      display:none;
      font-size:14px;
      font-weight:600;
    }

    .status-success{
      background:#dcfce7;
      color:#166534;
      display:block;
    }

    .status-error{
      background:#fee2e2;
      color:#991b1b;
      display:block;
    }

    .list-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:15px;
      flex-wrap:wrap;
    }

    .search-box{
      width:260px;
      max-width:100%;
    }

    .notification-list{
      display:flex;
      flex-direction:column;
      gap:14px;
      max-height:75vh;
      overflow:auto;
      padding-right:4px;
    }

    .notification-item{
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:16px;
      background:#fafafa;
    }

    .notification-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .notification-title{
      font-size:18px;
      font-weight:800;
      color:#111827;
      margin-bottom:6px;
    }

    .badge-wrap{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
    }

    .badge-type{
      background:#dbeafe;
      color:#1d4ed8;
    }

    .badge-active{
      background:#dcfce7;
      color:#166534;
    }

    .badge-inactive{
      background:#fee2e2;
      color:#991b1b;
    }

    .notification-message{
      color:#475569;
      line-height:1.6;
      margin-bottom:12px;
      white-space:pre-wrap;
    }

    .small-text{
      font-size:13px;
      color:#64748b;
      margin-bottom:10px;
    }

    .item-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .empty-state{
      text-align:center;
      color:#64748b;
      padding:30px 10px;
      border:1px dashed #cbd5e1;
      border-radius:16px;
      background:#fff;
    }

    @media (max-width: 900px){
      .grid{
        grid-template-columns:1fr;
      }

      .notification-list{
        max-height:none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1>Admin Notifications</h1>
        <p>Create, update, and manage news or notification messages</p>
      </div>
    </div>

    <div class="grid">
      <!-- FORM -->
      <div class="card">
        <h2 id="formTitle">Create Notification</h2>

        <div id="statusBox" class="status-box"></div>

        <form id="notificationForm">
          <input type="hidden" id="notificationId" />

          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" class="form-control" placeholder="Enter notification title" required />
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" class="form-control" placeholder="Write your notification or news message here..." required></textarea>
          </div>

          <div class="form-group">
            <label for="type">Type</label>
            <select id="type" class="form-control">
              <option value="notification">Notification</option>
              <option value="news">News</option>
              <option value="announcement">Announcement</option>
            </select>
          </div>

          <div class="form-group">
            <label for="status">Status</label>
            <select id="status" class="form-control">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>

          <div class="btn-row">
            <button type="submit" class="btn btn-primary" id="saveBtn">Save Notification</button>
            <button type="button" class="btn btn-secondary" onclick="resetForm()">Clear</button>
          </div>
        </form>
      </div>

      <!-- LIST -->
      <div class="card">
        <div class="list-header">
          <h2>All Notifications</h2>
          <input type="text" id="searchInput" class="form-control search-box" placeholder="Search by title or message..." />
        </div>

        <div id="notificationList" class="notification-list">
          <div class="empty-state">Loading notifications...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE =
      location.hostname === "localhost" || location.hostname === "127.0.0.1"
        ? "http://localhost:5000"
        : "";

    let allNotifications = [];

    function showStatus(message, type = "success") {
      const box = document.getElementById("statusBox");
      box.className = "status-box " + (type === "success" ? "status-success" : "status-error");
      box.textContent = message;

      setTimeout(() => {
        box.className = "status-box";
        box.textContent = "";
      }, 3000);
    }

    function formatDate(dateString) {
      if (!dateString) return "-";
      const date = new Date(dateString);
      return date.toLocaleString();
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function renderNotifications(data) {
      const list = document.getElementById("notificationList");

      if (!data || data.length === 0) {
        list.innerHTML = `<div class="empty-state">No notifications found.</div>`;
        return;
      }

      list.innerHTML = data.map(item => `
        <div class="notification-item">
          <div class="notification-top">
            <div>
              <div class="notification-title">${escapeHtml(item.title)}</div>
              <div class="small-text">
                Created: ${formatDate(item.created_at)}<br>
                Updated: ${formatDate(item.updated_at)}
              </div>
            </div>

            <div class="badge-wrap">
              <span class="badge badge-type">${escapeHtml(item.type)}</span>
              <span class="badge ${item.status === 'active' ? 'badge-active' : 'badge-inactive'}">
                ${escapeHtml(item.status)}
              </span>
            </div>
          </div>

          <div class="notification-message">${escapeHtml(item.message)}</div>

          <div class="item-actions">
            <button class="btn btn-warning" onclick="editNotification(${item.id})">Update</button>
            <button class="btn btn-danger" onclick="deleteNotification(${item.id})">Delete</button>
          </div>
        </div>
      `).join("");
    }

    async function loadNotifications() {
      try {
        const res = await fetch(`${API_BASE}/api/notifications`);
        const data = await res.json();

        if (!data.success) {
          throw new Error(data.message || "Failed to load notifications");
        }

        allNotifications = data.data || [];
        renderNotifications(allNotifications);
      } catch (err) {
        document.getElementById("notificationList").innerHTML = `
          <div class="empty-state">Failed to load notifications.</div>
        `;
        console.error(err);
      }
    }

    async function editNotification(id) {
      try {
        const res = await fetch(`${API_BASE}/api/notifications/${id}`);
        const data = await res.json();

        if (!data.success) {
          throw new Error(data.message || "Failed to fetch notification");
        }

        const item = data.data;

        document.getElementById("notificationId").value = item.id;
        document.getElementById("title").value = item.title || "";
        document.getElementById("message").value = item.message || "";
        document.getElementById("type").value = item.type || "notification";
        document.getElementById("status").value = item.status || "active";
        document.getElementById("formTitle").textContent = "Update Notification";
        document.getElementById("saveBtn").textContent = "Update Notification";

        window.scrollTo({ top: 0, behavior: "smooth" });
      } catch (err) {
        console.error(err);
        showStatus("Failed to load notification for editing", "error");
      }
    }

    async function deleteNotification(id) {
      const ok = confirm("Are you sure you want to delete this notification?");
      if (!ok) return;

      try {
        const res = await fetch(`${API_BASE}/api/notifications/${id}`, {
          method: "DELETE"
        });

        const data = await res.json();

        if (!data.success) {
          throw new Error(data.message || "Delete failed");
        }

        showStatus("Notification deleted successfully");
        loadNotifications();

        const currentId = document.getElementById("notificationId").value;
        if (String(currentId) === String(id)) {
          resetForm();
        }
      } catch (err) {
        console.error(err);
        showStatus("Failed to delete notification", "error");
      }
    }

    function resetForm() {
      document.getElementById("notificationForm").reset();
      document.getElementById("notificationId").value = "";
      document.getElementById("formTitle").textContent = "Create Notification";
      document.getElementById("saveBtn").textContent = "Save Notification";
    }

    document.getElementById("notificationForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const id = document.getElementById("notificationId").value.trim();
      const title = document.getElementById("title").value.trim();
      const message = document.getElementById("message").value.trim();
      const type = document.getElementById("type").value;
      const status = document.getElementById("status").value;

      if (!title || !message) {
        showStatus("Title and message are required", "error");
        return;
      }

      const payload = { title, message, type, status };

      try {
        let res;

        if (id) {
          res = await fetch(`${API_BASE}/api/notifications/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
        } else {
          res = await fetch(`${API_BASE}/api/notifications`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
        }

        const data = await res.json();

        if (!data.success) {
          throw new Error(data.message || "Operation failed");
        }

        showStatus(id ? "Notification updated successfully" : "Notification created successfully");
        resetForm();
        loadNotifications();
      } catch (err) {
        console.error(err);
        showStatus(err.message || "Something went wrong", "error");
      }
    });

    document.getElementById("searchInput").addEventListener("input", function() {
      const keyword = this.value.toLowerCase().trim();

      if (!keyword) {
        renderNotifications(allNotifications);
        return;
      }

      const filtered = allNotifications.filter(item =>
        (item.title || "").toLowerCase().includes(keyword) ||
        (item.message || "").toLowerCase().includes(keyword) ||
        (item.type || "").toLowerCase().includes(keyword) ||
        (item.status || "").toLowerCase().includes(keyword)
      );

      renderNotifications(filtered);
    });

    loadNotifications();
  </script>
</body>
</html>
