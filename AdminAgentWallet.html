<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Agent Wallet Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#1FAF6B;
      --primary-dark:#169657;
      --primary-soft:#EAFBF2;
      --bg:#F7FAF8;
      --card:#FFFFFF;
      --text:#0F172A;
      --muted:#64748B;
      --border:#E5E7EB;
      --danger:#DC2626;
      --danger-soft:#FEF2F2;
      --warning:#F59E0B;
      --warning-soft:#FFF7ED;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:1400px;
      margin:auto;
      padding:24px;
    }

    .hero{
      background:linear-gradient(135deg,#1FAF6B,#15935A);
      color:#fff;
      padding:28px;
      border-radius:24px;
      box-shadow:var(--shadow);
      margin-bottom:24px;
    }

    .hero h1{
      margin:0 0 8px;
      font-size:30px;
      font-weight:800;
    }

    .hero p{
      margin:0;
      opacity:.95;
      font-size:15px;
    }

    .topbar{
      display:grid;
      grid-template-columns:1fr 160px;
      gap:14px;
      margin-bottom:20px;
    }

    .search-box,
    .refresh-btn{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      min-height:56px;
      box-shadow:var(--shadow);
    }

    .search-box{
      display:flex;
      align-items:center;
      padding:0 16px;
    }

    .search-box input{
      width:100%;
      border:none;
      outline:none;
      font-size:15px;
      background:transparent;
      color:var(--text);
    }

    .refresh-btn{
      border:none;
      background:var(--primary);
      color:#fff;
      font-weight:700;
      cursor:pointer;
      transition:.2s ease;
    }

    .refresh-btn:hover{
      background:var(--primary-dark);
      transform:translateY(-1px);
    }

    .table-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .table-wrap{
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1200px;
    }

    thead{
      background:#F8FAFC;
    }

    th, td{
      padding:16px 14px;
      text-align:left;
      border-bottom:1px solid #EDF2F7;
      vertical-align:top;
      font-size:14px;
    }

    th{
      font-size:13px;
      color:var(--muted);
      font-weight:700;
      white-space:nowrap;
    }

    tr:hover td{
      background:#FCFDFC;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:7px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
    }

    .badge.active{
      background:var(--primary-soft);
      color:var(--primary-dark);
    }

    .badge.pending{
      background:#FFF7ED;
      color:#B45309;
    }

    .badge.inactive{
      background:#FEF2F2;
      color:#B91C1C;
    }

    .money{
      font-weight:800;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      transition:.2s ease;
      white-space:nowrap;
    }

    .btn.deposit{
      background:var(--primary);
      color:#fff;
    }

    .btn.deposit:hover{
      background:var(--primary-dark);
    }

    .btn.balance-minus{
      background:var(--danger-soft);
      color:var(--danger);
    }

    .btn.balance-minus:hover,
    .btn.od-plus:hover,
    .btn.od-minus:hover{
      transform:translateY(-1px);
    }

    .btn.od-plus{
      background:#ECFDF5;
      color:#047857;
    }

    .btn.od-minus{
      background:#FEF2F2;
      color:#B91C1C;
    }

    .empty{
      padding:30px;
      text-align:center;
      color:var(--muted);
      font-weight:600;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(2,6,23,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:16px;
      z-index:9999;
    }

    .modal.show{
      display:flex;
    }

    .modal-card{
      width:100%;
      max-width:520px;
      background:#fff;
      border-radius:24px;
      box-shadow:0 20px 60px rgba(0,0,0,.25);
      overflow:hidden;
      animation:pop .2s ease;
    }

    @keyframes pop{
      from{transform:scale(.96); opacity:0}
      to{transform:scale(1); opacity:1}
    }

    .modal-head{
      padding:22px 22px 12px;
      border-bottom:1px solid var(--border);
    }

    .modal-head h2{
      margin:0 0 6px;
      font-size:22px;
    }

    .modal-head p{
      margin:0;
      color:var(--muted);
      font-size:14px;
      line-height:1.5;
    }

    .modal-body{
      padding:22px;
      display:grid;
      gap:14px;
    }

    .field{
      display:grid;
      gap:8px;
    }

    .field label{
      font-size:13px;
      font-weight:700;
      color:var(--muted);
    }

    .field input{
      width:100%;
      border:1px solid var(--border);
      border-radius:14px;
      min-height:48px;
      padding:12px 14px;
      font-size:15px;
      outline:none;
    }

    .field input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(31,175,107,.12);
    }

    .modal-foot{
      padding:0 22px 22px;
      display:flex;
      gap:12px;
      justify-content:flex-end;
    }

    .btn2{
      min-height:48px;
      padding:0 18px;
      border:none;
      border-radius:14px;
      font-weight:800;
      cursor:pointer;
    }

    .btn-cancel{
      background:#F1F5F9;
      color:#0F172A;
    }

    .btn-save{
      background:var(--primary);
      color:#fff;
    }

    .toast{
      position:fixed;
      right:18px;
      bottom:18px;
      min-width:280px;
      max-width:420px;
      background:#fff;
      border-left:5px solid var(--primary);
      box-shadow:0 14px 30px rgba(0,0,0,.15);
      border-radius:16px;
      padding:16px 18px;
      display:none;
      z-index:10000;
    }

    .toast.show{
      display:block;
    }

    .toast.error{
      border-left-color:var(--danger);
    }

    @media (max-width: 900px){
      .topbar{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Agent Wallet Management</h1>
      <p>Deposit to agent balance, deduct balance, manage overdraft, and automatically activate agents when funded.</p>
    </div>

    <div class="topbar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by first name, last name, phone or email">
      </div>
      <button class="refresh-btn" onclick="loadAgents()">Refresh</button>
    </div>

    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Agent Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Gender</th>
              <th>Address</th>
              <th>Status</th>
              <th>Balance</th>
              <th>Sales Deposit</th>
              <th>Overdraft</th>
              <th>Created At</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="agentsBody">
            <tr>
              <td colspan="12" class="empty">Loading agents...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal" id="actionModal">
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="modalTitle">Agent Action</h2>
        <p id="modalSubtitle">Choose amount and submit.</p>
      </div>

      <div class="modal-body">
        <div class="field">
          <label>Agent</label>
          <input type="text" id="agentNameField" readonly>
        </div>

        <div class="field">
          <label>Amount</label>
          <input type="number" id="amountField" min="0" step="0.01" placeholder="Enter amount">
        </div>

        <div class="field">
          <label>Action Type</label>
          <input type="text" id="actionTypeField" readonly>
        </div>
      </div>

      <div class="modal-foot">
        <button class="btn2 btn-cancel" type="button" onclick="closeModal()">Cancel</button>
        <button class="btn2 btn-save" type="button" onclick="submitAction()">Submit</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = window.location.hostname === "localhost"
      ? "http://localhost:5000"
      : "https://edatagh.com/edatagh-backend";

    let selectedAgentId = null;
    let selectedAction = "";

    function money(v) {
      return Number(v || 0).toFixed(2);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showToast(message, isError = false) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = "toast show" + (isError ? " error" : "");
      setTimeout(() => {
        toast.className = "toast";
      }, 3000);
    }

    function getStatusBadge(status) {
      const s = String(status || "").toLowerCase();

      if (s === "active") {
        return `<span class="badge active">Active</span>`;
      }

      if (s === "inactive") {
        return `<span class="badge inactive">Inactive</span>`;
      }

      return `<span class="badge pending">${escapeHtml(status || "Pending")}</span>`;
    }

    function openModal(agentId, agentName, action) {
      selectedAgentId = agentId;
      selectedAction = action;

      const actionMap = {
        deposit_balance: "Deposit Balance",
        deduct_balance: "Deduct Balance",
        add_overdraft: "Add Overdraft",
        deduct_overdraft: "Deduct Overdraft"
      };

      document.getElementById("modalTitle").textContent = actionMap[action] || "Agent Action";
      document.getElementById("modalSubtitle").textContent =
        action === "deposit_balance"
          ? "This will add money to the main balance and automatically make the agent active."
          : "Enter the amount for this action.";

      document.getElementById("agentNameField").value = agentName;
      document.getElementById("amountField").value = "";
      document.getElementById("actionTypeField").value = actionMap[action] || action;
      document.getElementById("actionModal").classList.add("show");
    }

    function closeModal() {
      document.getElementById("actionModal").classList.remove("show");
      selectedAgentId = null;
      selectedAction = "";
    }

    async function loadAgents(search = "") {
      const tbody = document.getElementById("agentsBody");
      tbody.innerHTML = `<tr><td colspan="12" class="empty">Loading agents...</td></tr>`;

      try {
        const res = await fetch(`${API_BASE}/api/admin-agent-wallet-list?search=${encodeURIComponent(search)}`);
        const result = await res.json();

        console.log("Admin wallet agent list:", result);

        if (!res.ok || !result.success) {
          throw new Error(result.message || "Failed to load agents");
        }

        const rows = Array.isArray(result.data) ? result.data : [];

        if (!rows.length) {
          tbody.innerHTML = `<tr><td colspan="12" class="empty">No agents found.</td></tr>`;
          return;
        }

        tbody.innerHTML = rows.map(agent => {
          const fullName = `${agent.first_name || ""} ${agent.last_name || ""}`.trim();

          return `
            <tr>
              <td>${escapeHtml(agent.id)}</td>
              <td><strong>${escapeHtml(fullName)}</strong></td>
              <td>${escapeHtml(agent.phone || "")}</td>
              <td>${escapeHtml(agent.email || "")}</td>
              <td>${escapeHtml(agent.gender || "")}</td>
              <td>${escapeHtml(agent.address || "")}</td>
              <td>${getStatusBadge(agent.status)}</td>
              <td class="money">GHS ${money(agent.balance)}</td>
              <td class="money">GHS ${money(agent.sales_deposit)}</td>
              <td class="money">GHS ${money(agent.overdraft)}</td>
              <td>${agent.created_at ? new Date(agent.created_at).toLocaleString() : ""}</td>
              <td>
                <div class="actions">
                  <button class="btn deposit" onclick='openModal(${Number(agent.id)}, ${JSON.stringify(fullName)}, "deposit_balance")'>
                    Deposit Balance
                  </button>
                  <button class="btn balance-minus" onclick='openModal(${Number(agent.id)}, ${JSON.stringify(fullName)}, "deduct_balance")'>
                    Deduct Balance
                  </button>
                  <button class="btn od-plus" onclick='openModal(${Number(agent.id)}, ${JSON.stringify(fullName)}, "add_overdraft")'>
                    Add Overdraft
                  </button>
                  <button class="btn od-minus" onclick='openModal(${Number(agent.id)}, ${JSON.stringify(fullName)}, "deduct_overdraft")'>
                    Deduct Overdraft
                  </button>
                </div>
              </td>
            </tr>
          `;
        }).join("");

      } catch (err) {
        console.error("Error loading agents:", err);
        tbody.innerHTML = `<tr><td colspan="12" class="empty">Failed to load agents.</td></tr>`;
        showToast(err.message || "Error loading agents", true);
      }
    }

    async function submitAction() {
      const amount = Number(document.getElementById("amountField").value);

      if (!selectedAgentId || !selectedAction) {
        showToast("No action selected.", true);
        return;
      }

      if (!amount || amount <= 0) {
        showToast("Enter a valid amount.", true);
        return;
      }

      let endpoint = "";

      if (selectedAction === "deposit_balance") {
        endpoint = `/api/admin-agent-wallet/deposit/${selectedAgentId}`;
      } else if (selectedAction === "deduct_balance") {
        endpoint = `/api/admin-agent-wallet/deduct-balance/${selectedAgentId}`;
      } else if (selectedAction === "add_overdraft") {
        endpoint = `/api/admin-agent-wallet/add-overdraft/${selectedAgentId}`;
      } else if (selectedAction === "deduct_overdraft") {
        endpoint = `/api/admin-agent-wallet/deduct-overdraft/${selectedAgentId}`;
      } else {
        showToast("Invalid action selected.", true);
        return;
      }

      try {
        const res = await fetch(`${API_BASE}${endpoint}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ amount })
        });

        const result = await res.json();

        if (!res.ok || !result.success) {
          throw new Error(result.message || "Action failed");
        }

        showToast(result.message || "Action completed successfully");
        closeModal();
        loadAgents(document.getElementById("searchInput").value.trim());
      } catch (err) {
        console.error("Action error:", err);
        showToast(err.message || "Action failed", true);
      }
    }

    let searchTimer = null;
    document.getElementById("searchInput").addEventListener("input", function() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        loadAgents(this.value.trim());
      }, 350);
    });

    window.addEventListener("click", function(e) {
      const modal = document.getElementById("actionModal");
      if (e.target === modal) {
        closeModal();
      }
    });

    loadAgents();
  </script>
</body>
</html>
