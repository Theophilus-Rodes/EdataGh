<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Agent Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#1FAF6B;
      --primary-soft:#E9F9F1;
      --bg:#F8FAF9;
      --card:#FFFFFF;
      --text:#0F172A;
      --muted:#64748B;
      --border:#E5E7EB;
      --shadow: 0 18px 40px rgba(2,6,23,.10);
    }
    *{box-sizing:border-box;font-family:Inter,system-ui,Segoe UI,Roboto,Arial}
    body{
      margin:0;
      background:
        radial-gradient(900px 450px at 20% 10%, rgba(31,175,107,.16), transparent 62%),
        radial-gradient(900px 520px at 85% 20%, rgba(31,175,107,.10), transparent 65%),
        var(--bg);
      color:var(--text);
      padding:26px 16px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }
    .wrap{width:min(600px,100%);}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .head{
      padding:18px 18px 10px;
      background:linear-gradient(90deg, var(--primary-soft), #fff);
      border-bottom:1px solid var(--border);
    }
    .head-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .logo{height:34px;object-fit:contain}
    .back{
      text-decoration:none;
      border:1px solid var(--border);
      padding:10px 12px;
      border-radius:12px;
      color:var(--text);
      font-weight:900;
      background:#fff;
    }
    h1{margin:12px 0 6px;font-size:22px;font-weight:1000}
    .sub{margin:0;color:var(--muted);font-size:13px;line-height:1.6}
    form{padding:18px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .row{display:flex;flex-direction:column;gap:8px}
    .full{grid-column:1 / -1}
    label{font-size:13px;font-weight:900}
    input, select, textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      outline:none;
      background:#fff;
      font-weight:600;
      font-size:14px;
    }
    textarea{min-height:86px;resize:vertical}
    input:focus, select:focus, textarea:focus{
      border-color:rgba(31,175,107,.65);
      box-shadow:0 0 0 4px rgba(31,175,107,.12);
    }
    .btn{
      width:100%;
      height:52px;
      border:0;
      border-radius:14px;
      background:var(--primary);
      color:#fff;
      font-weight:1000;
      cursor:pointer;
      margin-top:14px;
      transition:.2s ease;
      box-shadow:0 14px 28px rgba(31,175,107,.20);
    }
    .btn:hover{transform:translateY(-1px);filter:brightness(.98)}
    .helper{margin-top:12px;font-size:13px;color:var(--muted);text-align:center}
    .helper a{color:var(--primary);font-weight:900;text-decoration:none}
    .helper a:hover{text-decoration:underline}
    .msg{
      display:none;
      margin:14px 18px 0;
      border-radius:14px;
      padding:12px;
      border:1px solid var(--border);
      font-weight:800;
      font-size:13px;
    }
    .msg.ok{border-color:rgba(31,175,107,.45);background:rgba(31,175,107,.08);color:#0B3D23}
    .msg.err{border-color:rgba(229,69,69,.45);background:rgba(229,69,69,.08);color:#5A1212}
    @media(max-width:620px){.grid{grid-template-columns:1fr}}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <div class="head-top">
          <img src="EDATA-LOGO.png" class="logo" alt="EDATA Logo">
          <a class="back" href="login.html">Back</a>
        </div>
        <h1>Create Account</h1>
        <p class="sub">Fill in your details to start selling data bundles.</p>
      </div>

      <div id="msg" class="msg"></div>

      <form id="registerForm">
        <div class="grid">
          <div class="row">
            <label>First Name</label>
            <input name="first_name" placeholder="Enter first name" required>
          </div>

          <div class="row">
            <label>Last Name</label>
            <input name="last_name" placeholder="Enter last name" required>
          </div>

          <div class="row">
            <label>Telephone Number</label>
            <input name="phone" placeholder="e.g. 054xxxxxxx" required>
          </div>

          <div class="row">
            <label>Email</label>
            <input name="email" type="email" placeholder="name@example.com" required>
          </div>

          <div class="row">
            <label>Gender</label>
            <select name="gender" required>
              <option value="">Select gender</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>

          <div class="row full">
            <label>Address</label>
            <textarea name="address" placeholder="Enter your address" required></textarea>
          </div>

          <div class="row">
            <label>PIN (4 digits)</label>
            <input name="pin" inputmode="numeric" maxlength="4" placeholder="****" required>
          </div>

          <div class="row">
            <label>Confirm PIN</label>
            <input name="confirm_pin" inputmode="numeric" maxlength="4" placeholder="****" required>
          </div>
        </div>

        <button class="btn" type="submit" id="btn">Create Account</button>

        <div class="helper">
          Already have an account? <a href="login.html">Login</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ✅ Set your backend base URL if needed:
    // const BASE = "https://yourdomain.com";
    const BASE = "";
    const API_REGISTER = BASE + "/api/agent/register";

    const form = document.getElementById("registerForm");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");

    function showMsg(type, text){
      msg.className = "msg " + (type === "ok" ? "ok" : "err");
      msg.textContent = text;
      msg.style.display = "block";
      window.scrollTo({top:0, behavior:"smooth"});
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = Object.fromEntries(new FormData(form).entries());

      if (data.pin !== data.confirm_pin) return showMsg("err", "PINs do not match.");
      if (!/^\d{4}$/.test(data.pin)) return showMsg("err", "PIN must be exactly 4 digits.");

      btn.disabled = true;
      btn.textContent = "Creating...";

      try{
        const res = await fetch(API_REGISTER, {
          method: "POST",
          headers: { "Content-Type":"application/json" },
          body: JSON.stringify(data)
        });

        const out = await res.json();

        if (!out.ok){
          btn.disabled = false;
          btn.textContent = "Create Account";
          return showMsg("err", out.error || "Registration failed.");
        }

        showMsg("ok", out.message || "Account created successfully.");
        form.reset();

        setTimeout(()=> window.location.href = "login.html", 1200);

      }catch(err){
        showMsg("err", "Network error. Please try again.");
      }finally{
        btn.disabled = false;
        btn.textContent = "Create Account";
      }
    });
  </script>
</body>
</html>
