<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Manage Agents</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#1FAF6B;
      --primary-dark:#159a5b;
      --bg:#f6f8fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --border:#e2e8f0;
      --danger:#dc2626;
      --danger-dark:#b91c1c;
      --warning:#f59e0b;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:18px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      background:var(--bg);
      color:var(--text);
      padding:24px;
    }

    .container{
      max-width:1200px;
      margin:0 auto;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:24px;
    }

    .title-wrap h1{
      font-size:28px;
      font-weight:800;
      margin-bottom:6px;
    }

    .title-wrap p{
      color:var(--muted);
      font-size:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:20px;
    }

    .toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .search-box{
      flex:1;
      min-width:280px;
      position:relative;
    }

    .search-box input{
      width:100%;
      padding:14px 16px;
      border:1px solid var(--border);
      border-radius:12px;
      outline:none;
      font-size:14px;
      background:#fff;
    }

    .search-box input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(31,175,107,.12);
    }

    .refresh-btn{
      border:none;
      background:var(--primary);
      color:#fff;
      padding:13px 18px;
      border-radius:12px;
      cursor:pointer;
      font-weight:700;
    }

    .refresh-btn:hover{
      background:var(--primary-dark);
    }

    .table-wrap{
      overflow-x:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1000px;
    }

    thead th{
      text-align:left;
      background:#f8fafc;
      color:#334155;
      font-size:13px;
      font-weight:700;
      padding:14px 12px;
      border-bottom:1px solid var(--border);
    }

    tbody td{
      padding:14px 12px;
      border-bottom:1px solid #eef2f7;
      vertical-align:middle;
      font-size:14px;
    }

    tbody tr:hover{
      background:#fafcff;
    }

    .badge{
      display:inline-block;
      padding:6px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
    }

    .badge.active{
      background:#dcfce7;
      color:#166534;
    }

    .badge.inactive{
      background:#fee2e2;
      color:#991b1b;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:10px;
      padding:9px 12px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
    }

    .btn.activate{
      background:#dcfce7;
      color:#166534;
    }

    .btn.deactivate{
      background:#fef3c7;
      color:#92400e;
    }

    .btn.delete{
      background:#fee2e2;
      color:#991b1b;
    }

    .empty-state{
      text-align:center;
      padding:30px 10px;
      color:var(--muted);
      font-size:15px;
    }

    .loading{
      text-align:center;
      padding:20px;
      color:var(--muted);
      font-weight:600;
    }

    .count-box{
      margin-bottom:14px;
      color:var(--muted);
      font-size:14px;
      font-weight:600;
    }

    @media (max-width:768px){
      body{
        padding:14px;
      }

      .title-wrap h1{
        font-size:22px;
      }

      .card{
        padding:14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="title-wrap">
        <h1>Manage Agents</h1>
        <p>View, search, activate, deactivate, or delete agents.</p>
      </div>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Search by name, phone, or email..."
          />
        </div>

        <button class="refresh-btn" onclick="loadAgents()">Refresh</button>
      </div>

      <div class="count-box" id="countBox">Loading agents...</div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Full Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Gender</th>
              <th>Address</th>
              <th>Status</th>
              <th>Balance</th>
              <th>Sales Deposit</th>
              <th>Created At</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="agentsTableBody">
            <tr>
              <td colspan="11" class="loading">Loading agents...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API_BASE =
      location.hostname === "localhost"
        ? "http://localhost:8080"
        : "https://edatagh.com/edatagh-backend";

  let allAgents = [];

  async function loadAgents() {
    const tbody = document.getElementById("agentsTableBody");
    const countBox = document.getElementById("countBox");

    tbody.innerHTML = `
      <tr>
        <td colspan="11" class="loading">Loading agents...</td>
      </tr>
    `;
    countBox.textContent = "Loading agents...";

    try {
      const res = await fetch(`${API_BASE}/api/admin/agents`);
      const data = await res.json();

      if (!res.ok || !data.success) {
        throw new Error(data.message || "Failed to load agents");
      }

      allAgents = data.data || [];
      renderAgents(allAgents);

    } catch (err) {
      console.error("Load agents error:", err);
      tbody.innerHTML = `
        <tr>
          <td colspan="11" class="empty-state">${err.message}</td>
        </tr>
      `;
      countBox.textContent = "0 agents found";
    }
  }

  function renderAgents(agents) {
    const tbody = document.getElementById("agentsTableBody");
    const countBox = document.getElementById("countBox");

    countBox.textContent = `${agents.length} agent(s) found`;

    if (!agents.length) {
      tbody.innerHTML = `
        <tr>
          <td colspan="11" class="empty-state">No agents found.</td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = agents.map(agent => {
      const fullName = `${agent.first_name || ""} ${agent.last_name || ""}`.trim();
      const statusClass = String(agent.status).toLowerCase() === "active" ? "active" : "inactive";

      return `
        <tr>
          <td>${agent.id ?? ""}</td>
          <td>${fullName}</td>
          <td>${agent.phone || ""}</td>
          <td>${agent.email || ""}</td>
          <td>${agent.gender || ""}</td>
          <td>${agent.address || ""}</td>
          <td><span class="badge ${statusClass}">${agent.status || "inactive"}</span></td>
          <td>${Number(agent.balance || 0).toFixed(2)}</td>
          <td>${Number(agent.sales_deposit || 0).toFixed(2)}</td>
          <td>${agent.created_at || ""}</td>
          <td>
            <div class="actions">
              <button class="btn activate" onclick="updateStatus(${agent.id}, 'active')">Activate</button>
              <button class="btn deactivate" onclick="updateStatus(${agent.id}, 'inactive')">Deactivate</button>
              <button class="btn delete" onclick="deleteAgent(${agent.id})">Delete</button>
            </div>
          </td>
        </tr>
      `;
    }).join("");
  }

  function filterAgents() {
    const keyword = document.getElementById("searchInput").value.toLowerCase().trim();

    const filtered = allAgents.filter(agent => {
      const fullName = `${agent.first_name || ""} ${agent.last_name || ""}`.toLowerCase();
      const phone = String(agent.phone || "").toLowerCase();
      const email = String(agent.email || "").toLowerCase();

      return (
        fullName.includes(keyword) ||
        phone.includes(keyword) ||
        email.includes(keyword)
      );
    });

    renderAgents(filtered);
  }

  async function updateStatus(id, status) {
    const actionText = status === "active" ? "activate" : "deactivate";
    if (!confirm(`Are you sure you want to ${actionText} this agent?`)) return;

    try {
      const res = await fetch(`${API_BASE}/api/admin/agents/${id}/status`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status })
      });

      const data = await res.json();

      if (!res.ok || !data.success) {
        throw new Error(data.message || "Failed to update status");
      }

      alert(data.message);
      loadAgents();
    } catch (err) {
      console.error("Update status error:", err);
      alert(err.message);
    }
  }

  async function deleteAgent(id) {
    if (!confirm("Are you sure you want to delete this agent?")) return;

    try {
      const res = await fetch(`${API_BASE}/api/admin/agents/${id}`, {
        method: "DELETE"
      });

      const data = await res.json();

      if (!res.ok || !data.success) {
        throw new Error(data.message || "Failed to delete agent");
      }

      alert(data.message);
      loadAgents();
    } catch (err) {
      console.error("Delete agent error:", err);
      alert(err.message);
    }
  }

  document.getElementById("searchInput").addEventListener("input", filterAgents);

  loadAgents();
</script>
</body>
</html>
