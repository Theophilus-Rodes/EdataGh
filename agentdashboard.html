<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EDATA Agent Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      /* ✅ Brand */
      --primary:#1FAF6B;
      --primary-soft:#E9F9F1;

      /* ✅ LIGHT (White + Green) */
      --bg:#F8FAF9;
      --panel:#FFFFFF;
      --card:#FFFFFF;
      --card2:#FFFFFF;
      --text:#0F172A;
      --muted:#64748B;
      --border:#E5E7EB;
      --shadow: 0 18px 40px rgba(2,6,23,.10);
      --btn:#F3F4F6;
      --btnText:#0F172A;

      /* Accents for network buttons */
      --mtn:#F5B400;
      --telecel:#E54545;
      --atl:#3B82F6;

      --radius:18px;
    }

    /* ✅ DARK theme (toggle) */
    html[data-theme="dark"]{
      --bg:#0B1220;
      --panel:#0F172A;
      --card:#111827;
      --card2:#0E1626;
      --text:#E5E7EB;
      --muted:#9CA3AF;
      --border:rgba(255,255,255,.12);
      --shadow: 0 20px 50px rgba(0,0,0,.35);
      --btn:#1F2937;
      --btnText:#E5E7EB;
    }

    *{box-sizing:border-box;font-family:Inter,system-ui,Segoe UI,Roboto,Arial}
    body{
      margin:0;
      background:
        radial-gradient(900px 450px at 20% 10%, rgba(31,175,107,.16), transparent 62%),
        radial-gradient(900px 520px at 85% 20%, rgba(31,175,107,.10), transparent 65%),
        var(--bg);
      color:var(--text);
    }

    /* =========================
       TOP BAR
       ========================= */
    .topbar{
      position:sticky;
      top:0;
      z-index:30;
      background:rgba(255,255,255,.78);
      border-bottom:1px solid var(--border);
      backdrop-filter: blur(10px);
    }
    html[data-theme="dark"] .topbar{
      background:rgba(15,23,42,.72);
    }

    .topbar-inner{
      max-width:1100px;
      margin:0 auto;
      padding:16px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .left{
      display:flex;
      align-items:center;
      gap:14px;
      min-width: 220px;
    }

    .hamburger{
      width:42px;height:42px;
      border-radius:14px;
      border:1px solid var(--border);
      background:rgba(31,175,107,.10);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:.2s ease;
      color:var(--text);
    }
    .hamburger:hover{
      transform:translateY(-1px);
      border-color:rgba(31,175,107,.55);
      box-shadow:0 10px 20px rgba(2,6,23,.08);
    }
    html[data-theme="dark"] .hamburger{
      background:rgba(255,255,255,.06);
      box-shadow:none;
    }

    .title{
      line-height:1.05;
      font-weight:1000;
      letter-spacing:.2px;
      font-size:20px;
    }
    .title small{
      display:block;
      font-size:20px;
      font-weight:1000;
    }

    .right{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .iconbtn{
      position:relative;
      width:44px;height:44px;
      border-radius:14px;
      border:1px solid var(--border);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:.2s ease;
      color:var(--text);
    }
    .iconbtn:hover{
      transform:translateY(-1px);
      border-color:rgba(31,175,107,.55);
      box-shadow:0 10px 20px rgba(2,6,23,.10);
    }
    html[data-theme="dark"] .iconbtn{
      background:rgba(255,255,255,.06);
      box-shadow:none;
    }

    .badge{
      position:absolute;
      top:-6px; right:-6px;
      width:22px;height:22px;
      background:#38BDF8;
      color:#0B1220;
      border-radius:999px;
      font-weight:1000;
      font-size:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:2px solid var(--bg);
    }

    /* =========================
       PAGE CONTENT
       ========================= */
    .container{
      max-width:1100px;
      margin:0 auto;
      padding:18px 16px 80px;
      width:100%;
    }

    .quick-actions{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:12px;
      margin-top:10px;
    }

    .qbtn{
      border-radius:14px;
      border:1px solid var(--border);
      background:var(--btn);
      color:var(--btnText);
      padding:14px 14px;
      font-weight:1000;
      text-align:center;
      cursor:pointer;
      transition:.2s ease;
    }
    .qbtn.primary{
      background: var(--primary);
      color:#fff;
      border-color: transparent;
      box-shadow: 0 14px 28px rgba(31,175,107,.20);
    }
    .qbtn:hover{
      transform:translateY(-1px);
      box-shadow:0 12px 26px rgba(2,6,23,.10);
    }
    html[data-theme="dark"] .qbtn:hover{
      box-shadow:0 12px 26px rgba(0,0,0,.18);
    }

    .section-title{
      margin:26px 0 6px;
      font-size:40px;
      font-weight:1000;
      letter-spacing:.3px;
    }
    .section-sub{
      margin:0 0 18px;
      color:var(--muted);
      font-size:15px;
      line-height:1.6;
    }

    .net-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:14px;
      margin-top:10px;
    }

    .netbtn{
      border-radius:14px;
      border:2px solid var(--border);
      background:#fff;
      padding:16px 14px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-weight:1000;
      letter-spacing:.2px;
      cursor:pointer;
      transition:.2s ease;
      user-select:none;
    }
    .netbtn:hover{
      transform:translateY(-1px);
      box-shadow:0 14px 30px rgba(2,6,23,.10);
    }
    html[data-theme="dark"] .netbtn{
      background:rgba(255,255,255,.06);
      box-shadow:none;
    }
    html[data-theme="dark"] .netbtn:hover{
      box-shadow:0 14px 30px rgba(0,0,0,.18);
    }

    .netbtn.mtn{
      background: rgba(245,180,0,.18);
      border-color: rgba(245,180,0,.55);
    }
    .netbtn.atl{
      background: rgba(59,130,246,.12);
      border-color: rgba(59,130,246,.55);
    }
    .netbtn.telecel{
      background: rgba(229,69,69,.12);
      border-color: rgba(229,69,69,.55);
    }

    .netbtn span{
      display:inline-flex;
      align-items:center;
      gap:10px;
    }

    .phoneIcon{ width:18px;height:18px; opacity:.9; }

    /* product card */
    .product{
      margin-top:18px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:18px;
      max-width:420px;
    }
    html[data-theme="dark"] .product{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(31,175,107,.10);
      font-weight:900;
      color:var(--muted);
      font-size:12px;
    }
    html[data-theme="dark"] .pill{ background:rgba(255,255,255,.06); }

    .dot{
      width:10px;height:10px;border-radius:50%;
      background:var(--mtn);
      box-shadow:0 0 0 4px rgba(245,180,0,.12);
    }

    .product-center{
      padding:18px 8px 8px;
      text-align:center;
    }
    .product-center h4{
      margin:0 0 10px;
      font-size:18px;
      font-weight:1000;
      color:var(--text);
      letter-spacing:.2px;
    }
    .gb{
      display:inline-block;
      padding:10px 16px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(2,6,23,.03);
      font-weight:1000;
      font-size:20px;
    }
    html[data-theme="dark"] .gb{ background:rgba(255,255,255,.06); }

    .price{
      margin-top:16px;
      font-size:34px;
      font-weight:1000;
      color: var(--primary);
    }
    .muted{
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
    }

    .addcart{
      margin-top:16px;
      width:100%;
      height:52px;
      border-radius:14px;
      border:0;
      background: var(--primary);
      color:#fff;
      font-weight:1000;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      transition:.2s ease;
      box-shadow: 0 14px 28px rgba(31,175,107,.20);
    }
    .addcart:hover{filter:brightness(.98); transform:translateY(-1px);}

    /* =========================
       SIDE DRAWER
       ========================= */
    .drawer-overlay{
      position:fixed;
      inset:0;
      background:rgba(2,6,23,.45);
      display:none;
      z-index:50;
    }

    .drawer{
      position:fixed;
      top:0; left:0;
      height:100%;
      width:min(320px, 86vw);
      background:#fff;
      border-right:1px solid var(--border);
      transform:translateX(-105%);
      transition:.25s ease;
      z-index:60;
      padding:18px 14px;
    }
    html[data-theme="dark"] .drawer{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      backdrop-filter: blur(10px);
    }

    .drawer.open{ transform:translateX(0); }

    .nav{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .nav a{
      text-decoration:none;
      color:var(--text);
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid transparent;
      transition:.2s ease;
      font-weight:900;
    }
    .nav a:hover{
      border-color:rgba(31,175,107,.35);
      background:rgba(31,175,107,.10);
    }
    .nav a.active{
      background: rgba(31,175,107,.16);
      border-color: rgba(31,175,107,.35);
      color: var(--text);
    }
    html[data-theme="dark"] .nav a.active{
      background: rgba(31,175,107,.22);
    }

    .nav .ico{
      width:22px;height:22px; opacity:.95;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .divider{
      height:1px;
      background:var(--border);
      margin:18px 6px;
    }

    .logout button{
      width:100%;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--border);
      background:rgba(229,69,69,.10);
      color:var(--text);
      font-weight:1000;
      cursor:pointer;
      transition:.2s ease;
      display:flex;
      align-items:center;
      gap:12px;
      justify-content:flex-start;
    }
    .logout button:hover{
      transform:translateY(-1px);
      border-color:rgba(229,69,69,.50);
      box-shadow:0 12px 24px rgba(2,6,23,.10);
    }

    /* responsive */
    @media (max-width: 720px){
      .title{font-size:18px}
      .section-title{font-size:34px}
      .quick-actions{grid-template-columns:1fr;}
      .net-grid{grid-template-columns:1fr;}
      .product{max-width:100%;}
      .left{min-width:auto}
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="left">
        <button class="hamburger" id="menuBtn" aria-label="Open menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>

        <div class="title">
          Agent<br><small>Dashboard</small>
        </div>
      </div>

      <div class="right">
        <!-- cart -->
        <button class="iconbtn" id="cartBtn" aria-label="Cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M7 6h14l-2 8H8L7 6Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M7 6 6 3H3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="9" cy="19" r="1.6" fill="currentColor"/>
            <circle cx="18" cy="19" r="1.6" fill="currentColor"/>
          </svg>
        </button>

        <!-- notifications -->
        <button class="iconbtn" id="notifBtn" aria-label="Notifications">
          <span class="badge" id="notifBadge">4</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M18 8a6 6 0 10-12 0c0 7-3 7-3 7h18s-3 0-3-7Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M13.8 20a2 2 0 01-3.6 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>

        <!-- theme toggle -->
        <button class="iconbtn" id="themeBtn" aria-label="Toggle theme">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 18a6 6 0 100-12 6 6 0 000 12Z" stroke="currentColor" stroke-width="2"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <div class="container">

    <div class="quick-actions">
      <button class="qbtn primary" onclick="toast('Open Delivery Status page')">Check Delivery<br/>Status</button>
      <button class="qbtn" onclick="toast('Download Template...')">Download<br/>Template</button>
      <button class="qbtn" onclick="toast('Open Bulk Upload...')">Bulk<br/>Upload</button>
    </div>

    <h2 class="section-title">Data Topup</h2>
    <p class="section-sub">Select a network and data bundle to get started.</p>

    <div class="net-grid">
      <div class="netbtn mtn" onclick="selectNet('MTN')">
        <span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M6 18v-3M10 18v-6M14 18v-9M18 18v-12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          MTN
        </span>
      </div>

      <div class="netbtn atl" onclick="selectNet('AIRTELTIGO iShare')">
        <span>
          <svg class="phoneIcon" viewBox="0 0 24 24" fill="none">
            <path d="M9 3h6a2 2 0 012 2v14a2 2 0 01-2 2H9a2 2 0 01-2-2V5a2 2 0 012-2Z" stroke="currentColor" stroke-width="2"/>
            <path d="M11 18h2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          AIRTELTIGO ISHARE
        </span>
      </div>

      <div class="netbtn atl" onclick="selectNet('AIRTELTIGO BigTime')">
        <span>
          <svg class="phoneIcon" viewBox="0 0 24 24" fill="none">
            <path d="M9 3h6a2 2 0 012 2v14a2 2 0 01-2 2H9a2 2 0 01-2-2V5a2 2 0 012-2Z" stroke="currentColor" stroke-width="2"/>
            <path d="M11 18h2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          AIRTELTIGO BIGTIME
        </span>
      </div>

      <div class="netbtn telecel" onclick="selectNet('TELECEL')">
        <span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M8.5 17.5a6 6 0 017-10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M6 12a10 10 0 0112 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M12 20h.01" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          </svg>
          TELECEL
        </span>
      </div>
    </div>

    <div class="product" id="productCard">
      <div class="pill"><span class="dot" id="netDot"></span> <span id="netPillText">MTN</span></div>

      <div class="product-center">
        <h4 id="netName">MTN</h4>

        <div style="opacity:.65;margin:10px 0 12px;">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <path d="M8.5 17.5a6 6 0 017-10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M6 12a10 10 0 0112 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M12 20h.01" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>

        <div class="gb" id="bundle">1 GB</div>
        <div class="price" id="price">GH₵4.00</div>
        <div class="muted">One-time payment</div>

        <button class="addcart" onclick="toast('Added to cart')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M7 6h14l-2 8H8L7 6Z" stroke="white" stroke-width="2" stroke-linejoin="round"/>
            <path d="M7 6 6 3H3" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Add to Cart
        </button>
      </div>
    </div>

  </div>

  <!-- Drawer -->
  <div class="drawer-overlay" id="drawerOverlay"></div>

  <aside class="drawer" id="drawer">
    <nav class="nav">
      <a class="active" href="#" onclick="return navClick('Dashboard')">
        <span class="ico">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M4 10.5 12 4l8 6.5V20a1 1 0 01-1 1h-5v-6H10v6H5a1 1 0 01-1-1v-9.5Z"
                  stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </span>
        Dashboard
      </a>

      <a href="#" onclick="return navClick('Orders')">
        <span class="ico">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M7 7h10M7 12h10M7 17h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M6 3h12a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V5a2 2 0 012-2Z"
                  stroke="currentColor" stroke-width="2"/>
          </svg>
        </span>
        Orders
      </a>

      <a href="#" onclick="return navClick('Wallet')">
        <span class="ico">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M3 7h18a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7Z" stroke="currentColor" stroke-width="2"/>
            <path d="M3 7a2 2 0 012-2h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M17 13h2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        Wallet
      </a>

      <a href="#" onclick="return navClick('AFA')">
        <span class="ico">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M16 11c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3Z"
                  stroke="currentColor" stroke-width="2"/>
            <path d="M8 11c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3Z"
                  stroke="currentColor" stroke-width="2"/>
            <path d="M8 13c-2.76 0-5 1.79-5 4v2h10v-2c0-2.21-2.24-4-5-4Z"
                  stroke="currentColor" stroke-width="2"/>
            <path d="M16 13c-1.1 0-2.12.28-3 .77"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        AFA
      </a>

      <a href="#" onclick="return navClick('Store')">
        <span class="ico">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M4 9h16l-1 11H5L4 9Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M7 9V7a5 5 0 0110 0v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        Store
      </a>

      <a href="agent_profile.html" >
        <span class="ico">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 15.5a3.5 3.5 0 110-7 3.5 3.5 0 010 7Z" stroke="currentColor" stroke-width="2"/>
            <path d="M19.4 15a7.9 7.9 0 00.1-2l2-1.5-2-3.5-2.4 1a8 8 0 00-1.7-1L15 4h-4l-.4 2.9a8 8 0 00-1.7 1L6.5 7 4.5 10.5 6.5 12a7.9 7.9 0 00.1 2l-2 1.5 2 3.5 2.4-1a8 8 0 001.7 1L11 20h4l.4-2.9a8 8 0 001.7-1l2.4 1 2-3.5-2.1-1.6Z"
                  stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </span>
        Settings
      </a>

      <a href="#" onclick="return navClick('Developer')">
        <span class="ico">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M9 18 3 12l6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M15 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        Developer
      </a>

      <a href="#" onclick="return navClick('Support')">
        <span class="ico">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 22a10 10 0 110-20 10 10 0 010 20Z" stroke="currentColor" stroke-width="2"/>
            <path d="M9.5 9.5a2.5 2.5 0 115 0c0 2-2.5 2-2.5 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M12 17h.01" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </span>
        Support
      </a>
    </nav>

    <div class="divider"></div>

    <div class="logout">
      <button onclick="logoutConfirm()">
        <span class="ico" style="width:22px;height:22px;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M10 17l7-7-7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 4h6v16H4a2 2 0 01-2-2V6a2 2 0 012-2Z" stroke="currentColor" stroke-width="2"/>
          </svg>
        </span>
        Logout
      </button>
    </div>
  </aside>

  <script>
    // Drawer open/close
    const drawer = document.getElementById('drawer');
    const overlay = document.getElementById('drawerOverlay');
    const menuBtn = document.getElementById('menuBtn');

    function openDrawer(){ overlay.style.display = 'block'; drawer.classList.add('open'); }
    function closeDrawer(){ overlay.style.display = 'none'; drawer.classList.remove('open'); }

    menuBtn.addEventListener('click', openDrawer);
    overlay.addEventListener('click', closeDrawer);
    window.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeDrawer(); });

    // Theme toggle (Light <-> Dark)
    document.getElementById('themeBtn').addEventListener('click', ()=>{
      const html = document.documentElement;
      const current = html.getAttribute('data-theme') || 'light';
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('edata_theme', next);
      toast(next === 'dark' ? 'Dark theme' : 'Light theme');
    });

    // Load saved theme
    (function(){
      const saved = localStorage.getItem('edata_theme');
      if(saved === 'light' || saved === 'dark'){
        document.documentElement.setAttribute('data-theme', saved);
      }
    })();

    // Cart & notifications
    document.getElementById('cartBtn').addEventListener('click', ()=>toast('Open Cart'));
    document.getElementById('notifBtn').addEventListener('click', ()=>toast('Notifications opened'));

    // Network selection
    function selectNet(name){
      document.getElementById('netPillText').textContent = name;
      document.getElementById('netName').textContent = name;

      const dot = document.getElementById('netDot');
      if(name.includes('MTN')) dot.style.background = getComputedStyle(document.documentElement).getPropertyValue('--mtn');
      else if(name.includes('TELECEL')) dot.style.background = getComputedStyle(document.documentElement).getPropertyValue('--telecel');
      else dot.style.background = getComputedStyle(document.documentElement).getPropertyValue('--atl');

      toast('Selected: ' + name);
    }

    function navClick(page){ toast(page + ' clicked'); closeDrawer(); return false; }

    function logoutConfirm(){
      const ok = confirm("Do you want to logout?");
      if(!ok) return;
      toast("Logging out...");
      setTimeout(()=>{ window.location.href = "login.html"; }, 1200);
    }

    // Toast
    let toastTimer;
    function toast(msg){
      let el = document.getElementById('toast');
      if(!el){
        el = document.createElement('div');
        el.id = 'toast';
        el.style.position = 'fixed';
        el.style.left = '50%';
        el.style.bottom = '22px';
        el.style.transform = 'translateX(-50%)';
        el.style.padding = '12px 14px';
        el.style.borderRadius = '14px';
        el.style.border = '1px solid var(--border)';
        el.style.background = 'rgba(15,23,42,.85)';
        el.style.color = '#fff';
        el.style.fontWeight = '900';
        el.style.zIndex = '200';
        el.style.backdropFilter = 'blur(10px)';
        el.style.maxWidth = '92vw';
        el.style.textAlign = 'center';
        document.body.appendChild(el);
      }
      el.textContent = msg;
      el.style.opacity = '1';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(()=>{ el.style.opacity = '0'; }, 1400);
    }
  </script>
</body>
</html>
