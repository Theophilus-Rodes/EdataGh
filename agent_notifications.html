<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Notifications - EDATA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      background:#f3f8f5;
      color:#0f172a;
    }

    .topbar{
      background:#fff;
      padding:18px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      box-shadow:0 4px 20px rgba(0,0,0,0.05);
      position:sticky;
      top:0;
      z-index:10;
    }

    .topbar-left{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .back-btn{
      border:none;
      background:#eaf7ef;
      color:#1FAF6B;
      width:42px;
      height:42px;
      border-radius:12px;
      font-size:18px;
      cursor:pointer;
      font-weight:700;
    }

    .page-title{
      font-size:24px;
      font-weight:800;
      color:#0f172a;
    }

    .wrapper{
      max-width:1200px;
      margin:24px auto;
      padding:0 16px;
    }

    .grid{
      display:grid;
      grid-template-columns: 380px 1fr;
      gap:20px;
    }

    .card{
      background:#fff;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.06);
      padding:18px;
    }

    .card h2{
      font-size:20px;
      margin-bottom:16px;
      color:#0f172a;
    }

    .search-box{
      width:100%;
      border:1px solid #dbe3ef;
      border-radius:12px;
      padding:12px 14px;
      outline:none;
      margin-bottom:14px;
      font-size:15px;
    }

    .search-box:focus{
      border-color:#1FAF6B;
      box-shadow:0 0 0 3px rgba(31,175,107,0.15);
    }

    .notification-list{
      display:flex;
      flex-direction:column;
      gap:12px;
      max-height:70vh;
      overflow:auto;
      padding-right:4px;
    }

    .notification-item{
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:14px;
      cursor:pointer;
      transition:0.2s ease;
      background:#fafafa;
    }

    .notification-item:hover{
      border-color:#1FAF6B;
      background:#f0fbf5;
    }

    .notification-item.active{
      border-color:#1FAF6B;
      background:#eafaf1;
    }

    .item-title{
      font-size:16px;
      font-weight:800;
      color:#0f172a;
      margin-bottom:6px;
    }

    .item-meta{
      font-size:12px;
      color:#64748b;
      margin-bottom:8px;
    }

    .item-snippet{
      font-size:14px;
      color:#475569;
      line-height:1.5;
    }

    .preview-empty{
      border:1px dashed #cbd5e1;
      border-radius:16px;
      padding:40px 20px;
      text-align:center;
      color:#64748b;
      background:#fafafa;
    }

    .preview-title{
      font-size:28px;
      font-weight:800;
      color:#0f172a;
      margin-bottom:10px;
    }

    .preview-meta{
      font-size:13px;
      color:#64748b;
      margin-bottom:18px;
    }

    .preview-type{
      display:inline-block;
      padding:7px 12px;
      border-radius:999px;
      background:#dff5e8;
      color:#15803d;
      font-size:12px;
      font-weight:700;
      margin-bottom:18px;
      text-transform:capitalize;
    }

    .preview-message{
      font-size:16px;
      line-height:1.8;
      color:#334155;
      white-space:pre-wrap;
    }

    .empty-state{
      text-align:center;
      padding:30px 15px;
      color:#64748b;
      border:1px dashed #cbd5e1;
      border-radius:16px;
      background:#fff;
    }

    @media (max-width: 900px){
      .grid{
        grid-template-columns:1fr;
      }

      .notification-list{
        max-height:none;
      }

      .preview-title{
        font-size:22px;
      }
    }

    .video-btn{
  background:#1FAF6B;
  color:#fff;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  font-size:14px;
  transition:0.2s ease;
}

.video-btn:hover{
  background:#17965a;
}
  </style>
</head>
<body>
 <div class="topbar">
  <div class="topbar-left">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="page-title">Notifications</div>
  </div>

  <!-- VIDEO BUTTON -->
  <button class="video-btn" onclick="goToVideos()">
    🎥 Learn
  </button>
</div>

  <div class="wrapper">
    <div class="grid">
      <!-- LEFT LIST -->
      <div class="card">
        <h2>All Notifications</h2>
        <input type="text" id="searchInput" class="search-box" placeholder="Search notifications..." />
        <div id="notificationList" class="notification-list">
          <div class="empty-state">Loading notifications...</div>
        </div>
      </div>

      <!-- RIGHT PREVIEW -->
      <div class="card">
        <div id="previewArea" class="preview-empty">
          Select a notification to read the full message.
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE =
      location.hostname === "localhost"
        ? "http://localhost:8080"
        : "https://edatagh.com/edatagh-backend";

    let allNotifications = [];
    let currentId = null;

    function goBack() {
      window.location.href = "agentdashboard.html";
    }

    function formatDate(dateString) {
      if (!dateString) return "-";
      const d = new Date(dateString);
      return d.toLocaleString();
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function renderNotificationList(list) {
      const container = document.getElementById("notificationList");

      if (!list || list.length === 0) {
        container.innerHTML = `<div class="empty-state">No notifications available.</div>`;
        return;
      }

      container.innerHTML = list.map(item => `
        <div class="notification-item ${currentId === item.id ? "active" : ""}" onclick="openNotification(${item.id})">
          <div class="item-title">${escapeHtml(item.title)}</div>
          <div class="item-meta">${formatDate(item.created_at)} • ${escapeHtml(item.type || "notification")}</div>
          <div class="item-snippet">${escapeHtml((item.message || "").slice(0, 90))}${(item.message || "").length > 90 ? "..." : ""}</div>
        </div>
      `).join("");
    }

    async function loadNotifications() {
      try {
        const res = await fetch(`${API_BASE}/api/agent/notifications`);
        const data = await res.json();

        if (!data.success) {
          throw new Error(data.message || "Failed to load notifications");
        }

        allNotifications = data.data || [];
        renderNotificationList(allNotifications);

        if (allNotifications.length > 0) {
          openNotification(allNotifications[0].id);
        } else {
          document.getElementById("previewArea").innerHTML = `
            <div class="preview-empty">No notifications available.</div>
          `;
        }
      } catch (error) {
        console.error(error);
        document.getElementById("notificationList").innerHTML = `
          <div class="empty-state">Failed to load notifications.</div>
        `;
        document.getElementById("previewArea").innerHTML = `
          <div class="preview-empty">Failed to load preview.</div>
        `;
      }
    }

    async function openNotification(id) {
      try {
        currentId = id;
        renderNotificationList(allNotifications);

        const res = await fetch(`${API_BASE}/api/agent/notifications/${id}`);
        const data = await res.json();

        if (!data.success) {
          throw new Error(data.message || "Failed to load notification");
        }

        const item = data.data;

        document.getElementById("previewArea").innerHTML = `
          <div class="preview-type">${escapeHtml(item.type || "notification")}</div>
          <div class="preview-title">${escapeHtml(item.title)}</div>
          <div class="preview-meta">
            Posted: ${formatDate(item.created_at)}<br>
            Last Updated: ${formatDate(item.updated_at)}
          </div>
          <div class="preview-message">${escapeHtml(item.message)}</div>
        `;
      } catch (error) {
        console.error(error);
        document.getElementById("previewArea").innerHTML = `
          <div class="preview-empty">Failed to load notification details.</div>
        `;
      }
    }

    document.getElementById("searchInput").addEventListener("input", function() {
      const keyword = this.value.toLowerCase().trim();

      if (!keyword) {
        renderNotificationList(allNotifications);
        return;
      }

      const filtered = allNotifications.filter(item =>
        (item.title || "").toLowerCase().includes(keyword) ||
        (item.message || "").toLowerCase().includes(keyword) ||
        (item.type || "").toLowerCase().includes(keyword)
      );

      renderNotificationList(filtered);
    });

    function goToVideos(){
  window.location.href = "videos.html";
}

    loadNotifications();
  </script>
</body>
</html>
